<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" 
          integrity="sha384-PFJl1HL6bNKymQMi5MVqJjATCCzOFf5aDgfhSOn1tcqI9JVKnKPBJU7Rg31Bh6k" 
          crossorigin="anonymous">
    <style>
      body { background: #f5f5f5; min-height: 100vh; font-family: Tahoma, Arial, sans-serif !important; }
      .main-title { background: linear-gradient(90deg, #a80000 0%, #d32f2f 100%); color: #fff; font-size: 2.1rem; font-weight: bold; border-radius: 1.2rem 1.2rem 0 0; padding: 1.2rem 0.5rem; text-align: center; letter-spacing: 1px; box-shadow: 0 2px 8px 0 rgba(168,0,0,0.08); }
      .card { border: none; border-radius: 1.2rem; background: #fff; box-shadow: 0 4px 24px 0 rgba(168,0,0,0.10); }
      .form-control-lg { border-radius: 0.8rem; font-size: 1.25rem; border: 2px solid #a80000; transition: box-shadow 0.2s; text-align: right; direction: rtl; }
      .form-control-lg:focus { box-shadow: 0 0 0 0.2rem #a8000033; border-color: #d32f2f; }
      .btn-primary { background: linear-gradient(90deg, #a80000 0%, #d32f2f 100%); border: none; border-radius: 0.8rem; font-weight: bold; box-shadow: 0 2px 8px 0 rgba(168,0,0,0.10); }
      .btn-primary:active, .btn-primary:focus { background: linear-gradient(90deg, #7f0000 0%, #a80000 100%); }
      .modal-content { border-radius: 1.2rem; background: #f8fafc; }
      .modal-title { color: #a80000; font-weight: bold; }
      .logo-img { max-width: 320px; width: 100%; height: auto; }
      .custom-title { border-radius: 0.8rem; font-size: 2rem; }
      .custom-subtitle { color: #a80000; font-weight: bold; }
      .card-container { max-width: 480px; }
      @media (max-width: 600px) { .card-container { max-width: 100% !important; } }
    </style>
</head>
<body>
    <div class="d-flex align-items-center justify-content-center flex-column flex-md-row min-vh-100">
      <div class="w-100 px-2 card-container">
          <div class="d-flex justify-content-center mb-3">
            <img src="https://www.moedu.gov.bh/desired_results/images/logo-hor-ar.png" class="logo-img" alt="Logo">
          </div>
          <div class="card p-4">
            <h2 class="main-title mb-4 custom-title">لمعرفة الرقم الأكاديمي</h2>
            <h4 class="text-center mb-4 custom-subtitle">أدخل الرقم الشخصي</h4>
            <div class="mb-3">
              <label for="CPRInputFeild" class="form-label visually-hidden">الرقم الشخصي</label>
              <div class="input-group input-group-lg" dir="rtl">
                <input type="text" id="CPRInputFeild" class="form-control form-control-lg" placeholder="الرقم الشخصي"
                autofocus onkeydown="if(event.key==='Enter'){SearchStudentDetails();}">
              </div>
            </div>
            <div class="d-grid gap-2">
              <button onclick="SearchStudentDetails()" id="SearchButton" class="btn btn-primary btn-lg">بحث</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="StudentDetailsModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title w-100 text-center">البيانات الشخصية</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center" id="ModalStudentDetails"></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
    <script>
      function SearchStudentDetails() {
        const CPRNumber = document.getElementById("CPRInputFeild").value.trim();
        if (CPRNumber === '') {
          ShowStudentDetailsModal('الرجاء إدخال الرقم الشخصي', true);
          return;
        }
        if (!/^\d{9}$/.test(CPRNumber)) {
            ShowStudentDetailsModal('الرقم الشخصي يجب أن يتكون من 9 أرقام فقط', true);
            return;
        }
        Loading(true);
        google.script.run
          .withSuccessHandler(DisplayStudentDetails)
          .withFailureHandler(function(err) {
            Loading(false);
            ShowStudentDetailsModal('حدث خطأ في الاتصال', true);
          })
          .SearchCPR(CPRNumber);
      }
      function DisplayStudentDetails(response) {
        Loading(false);
        if (typeof response !== 'object' || response === null) {
            ShowStudentDetailsModal('حدث خطأ في معالجة البيانات', true);
            return;
        }
        if (response.status === 'success') {
          const data = response.data;
          if(!data) {
             ShowStudentDetailsModal('لا توجد بيانات', true);
             return;
          }
          const container = document.createElement("div");
          container.dir = "rtl";
          container.style.textAlign = "right";
          const fields = [
            { label: "الاسم", value: data.name },
            { label: "الصف", value: data.class },
            { label: "الرقم الأكاديمي", value: data.academic }
          ];
          fields.forEach(function(field) {
            if(field.value === undefined) return;
            const row = document.createElement("div");
            row.className = "mb-2";
            const bold = document.createElement("b");
            bold.style.color = "#a80000";
            bold.textContent = field.label + ": ";
            const span = document.createElement("span");
            span.style.color = "#545454";
            span.textContent = field.value; 
            row.appendChild(bold);
            row.appendChild(span);
            container.appendChild(row);
          });
          const modalBody = document.getElementById('ModalStudentDetails');
          modalBody.innerHTML = ""; 
          modalBody.appendChild(container);
          ShowModal();
        } else {
          const msg = response.message || "حدث خطأ غير متوقع";
          ShowStudentDetailsModal(msg, true);
        }
      }
      function ShowStudentDetailsModal(text, isError = false) {
        const modalBody = document.getElementById('ModalStudentDetails');
        modalBody.innerHTML = "";
        const span = document.createElement("span");
        span.textContent = text;
        if(isError) span.style.color = "red";
        else span.style.color = "#545454";
        modalBody.appendChild(span);
        ShowModal();
      }
      function ShowModal() {
        var myModal = bootstrap.Modal.getOrCreateInstance(document.getElementById('StudentDetailsModal'));
        myModal.show();
      }
      function Loading(isLoading) {
        const btn = document.getElementById('SearchButton');
        if (isLoading) {
          btn.disabled = true;
          btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';
        } else {
          btn.disabled = false;
          btn.innerHTML = 'بحث';
        }
      }
      document.addEventListener('DOMContentLoaded', function() {
        var modal = document.getElementById('StudentDetailsModal');
        modal.addEventListener('hidden.bs.modal', function () {
          document.getElementById('CPRInputFeild').focus();
        });
      });
    </script>
  </body>
</html>
